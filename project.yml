name: OnePanel
options:
  createIntermediateGroups: true
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_BUNDLE_IDENTIFIER: com.onepanel.app
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    INFOPLIST_KEY_LSMinimumSystemVersion: 14.0
    INFOPLIST_KEY_LSUIElement: YES
targets:
  OnePanel:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/OnePanel
      - path: Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: OnePanel
        PRODUCT_MODULE_NAME: OnePanel
        SWIFT_EMIT_LOC_STRINGS: NO
    scheme:
      testTargets:
        - OnePanelTests

  OnePanelTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/OnePanelTests
    dependencies:
      - target: OnePanel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onepanel.app.tests
        GENERATE_INFOPLIST_FILE: YES
